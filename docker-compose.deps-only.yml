version: '3.8'

services:
  # MongoDB database
  mongodb:
    image: mongo:6.0
    container_name: greet-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: demo
    volumes:
      - mongodb_data:/data/db
    networks:
      - greet-network

  # Unleash feature flag service
  unleash-db:
    image: postgres:15
    container_name: unleash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: unleash
      POSTGRES_USER: unleash
      POSTGRES_PASSWORD: unleash_password
    volumes:
      - unleash_db_data:/var/lib/postgresql/data
    networks:
      - greet-network

  unleash:
    image: unleashorg/unleash-server:5.7
    container_name: unleash-server
    restart: unless-stopped
    ports:
      - "4242:4242"
    environment:
      DATABASE_URL: postgres://unleash:unleash_password@unleash-db:5432/unleash
      DATABASE_SSL: "false"
      LOG_LEVEL: warn
      INIT_FRONTEND_API_TOKENS: "*:development.828bf6a0278c7f7770567a78750e750cd87d98d8c8369c945e37ea40"
      INIT_CLIENT_API_TOKENS: "*:development.828bf6a0278c7f7770567a78750e750cd87d98d8c8369c945e37ea40"
    depends_on:
      - unleash-db
    networks:
      - greet-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4242/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  mongodb_data:
    driver: local
  unleash_db_data:
    driver: local

networks:
  greet-network:
    driver: bridge
