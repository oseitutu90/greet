name: AI PR Review (feature/* -> develop)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - develop   # base branch filter (targets develop)

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: startsWith(github.head_ref, 'feature/')  # head branch filter (source branch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm i @google/generative-ai @actions/core @actions/github

      - name: Run AI review
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }} # Changed from OPENAI_API_KEY
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/ai_pr_review.js